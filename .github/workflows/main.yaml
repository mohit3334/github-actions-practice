name: React CI Pipeline

on: push

jobs:
  build:
    runs-on: ubuntu-latest


    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Go to project folder 
        run: cd new-react

      - name: Install dependencies
        run: |
          cd new-react
          npm install

      - name: Build project
        run: |
          cd new-react
          npm run build    