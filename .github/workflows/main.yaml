name: React CI Pipeline

on: push

jobs:
  lint:
    runs-on: ubuntu-latest


    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm" 
          cache-dependency-path: new-react/package-lock.json

      - name: Go to project folder 
        run: cd new-react

      - name: Install dependencies
        run: |
          cd new-react
          npm install

      - name: Run Lintint
        run: |
          cd new-react
          npm run lint


  build:
    runs-on: ubuntu-latest
    needs: lint


    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm" 
          cache-dependency-path: new-react/package-lock.json

      - name: Go to project folder 
        run: cd new-react

      - name: Install dependencies
        run: |
          cd new-react
          npm install

      - name: "Run Tests"
        run: |
          cd new-react
          npm run test

      - name: Build project
        run: |
          cd new-react
          npm run build    

      - name: Login to Docker Hub
        run: echo "${{secrets.DOCKER_HUB_PASSWORD}}" | docker login -u "${{secrets.DOCKER_HUB_USERNAME}}" --password-stdin

      - name: Build Image
        run: |
          cd new-react
          docker build -t ${{secrets.DOCKER_HUB_USERNAME}}/my-new-react-app:v1 .

      - name: Push Image
        run: |
          docker push ${{secrets.DOCKER_HUB_USERNAME}}/my-new-reat-app:v1     
